version: "3.9"

services:
  api:
    build: .

    env_file:
      - .env

    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"

    volumes:
      - .:/app

    command: >
      sh -c "
      alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "